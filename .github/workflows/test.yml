name: Test Fundamental Agent

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.8, 3.9, '3.10']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run import tests
      run: |
        python -c "from agents.deepseek_provider import DeepSeekProvider; print('DeepSeek provider import successful')"
        python -c "from notifications.telegram_notifier import TelegramNotifier; print('Telegram notifier import successful')"
        python -c "from services.scheduler import run_scheduler; print('Scheduler import successful')"
        python -c "from system.health_checks import check_health; print('Health checks import successful')"

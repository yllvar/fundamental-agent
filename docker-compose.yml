version: '3.8'

services:
  fundamental-agent:
    build: .
    container_name: fundamental-agent
    restart: unless-stopped

    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      - ./logs:/app/logs
      - ./output:/app/output
      - ./config:/app/config

    ports:
      - "8501:8501"

    networks:
      - fundamental-agent-network

    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: fundamental-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fundamental-agent-network
    command: redis-server --appendonly yes

networks:
  fundamental-agent-network:
    driver: bridge

volumes:
  redis_data:
